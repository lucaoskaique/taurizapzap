name: build_windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  Build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install Node Dependencies
        run: npm install
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build Tauri App
        run: npm run tauri:build
      
      - name: Collect Artifacts
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" | Select-Object -First 1
          if ($exePath) {
            Copy-Item $exePath.FullName -Destination "./taurizapzap.exe"
          }
          $msiPath = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msiPath) {
            Copy-Item $msiPath.FullName -Destination "./taurizapzap.msi"
          }
      
      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taurizapzap-windows-exe
          path: taurizapzap.exe
          retention-days: 30
      
      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('taurizapzap.msi') != ''
        with:
          name: taurizapzap-windows-msi
          path: taurizapzap.msi
          retention-days: 30
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            taurizapzap.exe
            taurizapzap.msi
          draft: false
          prerelease: false
